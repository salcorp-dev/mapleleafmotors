<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login | Maple Leaf Motors</title>
<link rel="stylesheet" href="../assets/css/styles.css">
<link rel="icon" href="../assets/images/maple-leaf-motors-logo.png">
</head>
<body>
<div class="admin-login">
  <form id="loginForm" class="card" style="width:min(420px,92vw);padding:36px;">
    <div style="text-align:center;margin-bottom:28px;">
      <img src="../assets/images/maple-leaf-motors-logo.png" alt="Maple Leaf Motors" style="width:56px;height:56px;object-fit:contain;border-radius:14px;margin:0 auto 12px;">
      <h2 style="font-size:22px;">Owner Portal</h2>
      <p class="muted" style="font-size:14px;font-family:var(--font-ui);">Lead command center and inventory manager.</p>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Enter your password">
    </div>
    <button class="btn btn-full" style="margin-top:8px;">Login →</button>
    <p id="msg" class="muted" style="margin-top:12px;font-size:13px;font-family:var(--font-ui);text-align:center;"></p>
    <p class="muted" style="margin-top:16px;font-size:12px;text-align:center;font-family:var(--font-ui);">Prototype password: MapleLeaf2026</p>
  </form>
</div>
<script src="../assets/js/admin.js"></script>
</body>
</html>
